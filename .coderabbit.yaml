# CodeRabbit configuration for StudentHub Next
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "en"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
  path_filters:
    - "!**/*.sql"
    - "!**/*.rdb"
    - "!**/.keystore"
    - "!**/*.pepk"
    - "!**/node_modules/**"
    - "!**/.next/**"
chat:
  auto_reply: true
